name: Release

on:
  push:
    tags:
      - "[0-9]*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "26"
  RUST_BACKTRACE: short
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_RELEASE_CODEGEN_UNITS: 16
  CARGO_PROFILE_RELEASE_LTO: thin
  CARGO_NET_GIT_FETCH_WITH_CLI: true
  CARGO_NET_RETRY: 10

jobs:
  changelog:
    name: Changelog
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: startsWith(github.ref, 'refs/tags/')
    outputs:
      changelog: ${{ steps.changelog.outputs.content }}
      previous_tag: ${{ steps.previous_tag.outputs.tag }}
    steps:
      - name: Checkout (full history for tags/changelog)
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Get previous tag
        id: previous_tag
        shell: bash
        run: |
          PREVIOUS_TAG=$(git tag --sort=-v:refname | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | grep -v "${{ github.ref_name }}" | head -n 1)
          echo "tag=$PREVIOUS_TAG" >> $GITHUB_OUTPUT
          echo "Previous tag: $PREVIOUS_TAG"

      - name: Extract changelog
        id: changelog
        shell: bash
        run: |
          CHANGELOG=$(sed -n "/^## ${{ github.ref_name }}/,/^## /p" CHANGELOG.md | sed '1d;$d' | sed '/^$/d')
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="请查看完整的更新日志: [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)"
          fi
          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  release:
    name: Create or Update Release
    needs: changelog
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Generate release body (envsubst template)
        shell: bash
        env:
          VERSION: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
          PREVIOUS_TAG: ${{ needs.changelog.outputs.previous_tag }}
          CHANGELOG: ${{ needs.changelog.outputs.changelog }}
        run: |
          export VERSION REPOSITORY PREVIOUS_TAG CHANGELOG
          if [ -n "$PREVIOUS_TAG" ]; then
            export COMPARE_LINK="[${PREVIOUS_TAG}...${VERSION}](https://github.com/${REPOSITORY}/compare/${PREVIOUS_TAG}...${VERSION})"
          else
            export COMPARE_LINK="[查看提交历史](https://github.com/${REPOSITORY}/commits/${VERSION})"
          fi
          envsubst < .github/release_body_template.md > release_body.md
          echo "Generated release_body.md preview (first 60 lines):"
          sed -n '1,60p' release_body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          name: "Bing Wallpaper Now ${{ github.ref_name }}"
          draft: false
          prerelease: false
          make_latest: false
          body_path: release_body.md

      - name: Clean up stale updater artifacts
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          STALE_ASSETS=$(gh api "repos/${REPO}/releases/tags/${TAG}" \
            --jq '[.assets[] | select(.name == "latest.json" or (.name | endswith(".sig"))) | "\(.id)\t\(.name)"] | .[]' 2>/dev/null || true)

          if [ -z "$STALE_ASSETS" ]; then
            echo "No stale updater artifacts found, clean slate."
            exit 0
          fi

          echo "Removing stale updater artifacts from previous build:"
          while IFS=$'\t' read -r asset_id asset_name; do
            echo "  Deleting: $asset_name (id=$asset_id)"
            gh api -X DELETE "repos/${REPO}/releases/assets/${asset_id}" 2>/dev/null || true
          done <<< "$STALE_ASSETS"
          echo "✅ Stale artifacts cleaned up"

  frontend:
    name: Frontend Build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: dist
          retention-days: 3

  bundle-macos:
    name: Bundle (macOS)
    needs: [frontend, release]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Checkout (shallow)
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Download frontend dist
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: dist

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: release
          save-if: false

      - name: Import macOS signing certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ]; then
            echo "❌ Error: APPLE_CERTIFICATE secret is not configured"
            exit 1
          fi
          if [ -z "$APPLE_CERTIFICATE_PASSWORD" ]; then
            echo "❌ Error: APPLE_CERTIFICATE_PASSWORD secret is not configured"
            exit 1
          fi
          if [ -z "$KEYCHAIN_PASSWORD" ]; then
            echo "❌ Error: KEYCHAIN_PASSWORD secret is not configured"
            exit 1
          fi

          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Validate macOS signing identity
        shell: bash
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          if [ -z "$APPLE_SIGNING_IDENTITY" ]; then
            echo "❌ Error: APPLE_SIGNING_IDENTITY secret is not configured"
            exit 1
          fi

      - name: Patch tauri.conf.json
        shell: bash
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          jq --arg identity "$APPLE_SIGNING_IDENTITY" '
            .build.beforeBuildCommand = "" |
            .bundle.macOS.signingIdentity = $identity |
            .bundle.macOS.hardenedRuntime = true
          ' src-tauri/tauri.conf.json > src-tauri/tauri.conf.json.tmp
          mv src-tauri/tauri.conf.json.tmp src-tauri/tauri.conf.json

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: src-tauri
          tauriScript: pnpm tauri

      - name: Rename macOS .app.tar.gz to include architecture
        shell: bash
        run: |
          MACOS_DIR="src-tauri/target/release/bundle/macos"
          for f in "$MACOS_DIR"/*.app.tar.gz; do
            [ -f "$f" ] || continue
            base=$(basename "$f" .app.tar.gz)
            new_name="${base}_aarch64.app.tar.gz"
            mv "$f" "$MACOS_DIR/$new_name"
            [ -f "$f.sig" ] && mv "$f.sig" "$MACOS_DIR/${new_name}.sig"
          done

      - name: Verify macOS code signing
        shell: bash
        run: |
          APP_PATH=$(find src-tauri/target/release/bundle -name "*.app" -type d | head -n 1)
          [ -z "$APP_PATH" ] && { echo "❌ No .app bundle found"; exit 1; }
          codesign -dv --verbose=2 "$APP_PATH" 2>&1 | grep "Authority=" || { echo "❌ Unsigned"; exit 1; }

      - name: Upload bundle to Release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FILES=()
          shopt -s nullglob
          for f in src-tauri/target/release/bundle/dmg/*.dmg \
                   src-tauri/target/release/bundle/macos/*.app.tar.gz \
                   src-tauri/target/release/bundle/macos/*.app.tar.gz.sig; do
            [ -f "$f" ] && FILES+=("$f")
          done
          shopt -u nullglob
          [ ${#FILES[@]} -eq 0 ] && { echo "Error: No bundle files found"; exit 1; }
          gh release upload "${{ github.ref_name }}" "${FILES[@]}" --clobber

  bundle-windows-x64:
    name: Bundle (Windows x64)
    needs: [frontend, release]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout (shallow)
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Download frontend dist
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: dist

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: release
          save-if: false

      - name: Patch tauri.conf.json
        shell: bash
        run: |
          jq '.build.beforeBuildCommand = ""' src-tauri/tauri.conf.json > src-tauri/tauri.conf.json.tmp
          mv src-tauri/tauri.conf.json.tmp src-tauri/tauri.conf.json

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: src-tauri
          tauriScript: pnpm tauri

      - name: Upload bundle to Release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FILES=()
          shopt -s nullglob
          for f in src-tauri/target/release/bundle/msi/*.msi \
                   src-tauri/target/release/bundle/msi/*.msi.sig; do
            [ -f "$f" ] && FILES+=("$f")
          done
          shopt -u nullglob
          [ ${#FILES[@]} -eq 0 ] && { echo "Error: No bundle files found"; exit 1; }
          gh release upload "${{ github.ref_name }}" "${FILES[@]}" --clobber

  bundle-windows-arm64:
    name: Bundle (Windows ARM64)
    needs: [frontend, release]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: windows-11-arm
    timeout-minutes: 30
    steps:
      - name: Checkout (shallow)
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Download frontend dist
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: dist

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: release
          save-if: false

      - name: Patch tauri.conf.json
        shell: bash
        run: |
          jq '.build.beforeBuildCommand = ""' src-tauri/tauri.conf.json > src-tauri/tauri.conf.json.tmp
          mv src-tauri/tauri.conf.json.tmp src-tauri/tauri.conf.json

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: src-tauri
          tauriScript: pnpm tauri

      - name: Upload bundle to Release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FILES=()
          shopt -s nullglob
          for f in src-tauri/target/release/bundle/msi/*.msi \
                   src-tauri/target/release/bundle/msi/*.msi.sig; do
            [ -f "$f" ] && FILES+=("$f")
          done
          shopt -u nullglob
          [ ${#FILES[@]} -eq 0 ] && { echo "Error: No bundle files found"; exit 1; }
          gh release upload "${{ github.ref_name }}" "${FILES[@]}" --clobber

  updater:
    name: Generate Updater Manifest
    needs: [bundle-macos, bundle-windows-x64, bundle-windows-arm64]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate latest.json from release assets
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          RELEASE_URL="https://github.com/${REPO}/releases/download/${TAG}"
          PUB_DATE=$(gh api "repos/${REPO}/releases/tags/${TAG}" --jq '.published_at // .created_at')

          # Fetch release notes body
          NOTES=$(gh api "repos/${REPO}/releases/tags/${TAG}" --jq '.body // ""')

          declare -A PLATFORM_URL
          declare -A PLATFORM_SIG

          # Collect all assets with signatures
          while IFS=$'\t' read -r name; do
            case "$name" in
              *.app.tar.gz.sig)
                base="${name%.sig}"
                target=""
                if [[ "$name" == *"aarch64"* ]]; then
                  target="darwin-aarch64"
                fi
                if [ -n "$target" ]; then
                  PLATFORM_SIG["$target"]=$(gh release download "$TAG" --repo "$REPO" -p "$name" -O - 2>/dev/null || echo "")
                  PLATFORM_URL["$target"]="${RELEASE_URL}/${base}"
                fi
                ;;
              *.msi.sig)
                base="${name%.sig}"
                target=""
                if [[ "$name" == *"x64"* ]]; then
                  target="windows-x86_64"
                elif [[ "$name" == *"arm64"* || "$name" == *"aarch64"* ]]; then
                  target="windows-aarch64"
                fi
                if [ -n "$target" ]; then
                  PLATFORM_SIG["$target"]=$(gh release download "$TAG" --repo "$REPO" -p "$name" -O - 2>/dev/null || echo "")
                  PLATFORM_URL["$target"]="${RELEASE_URL}/${base}"
                fi
                ;;
            esac
          done < <(gh api "repos/${REPO}/releases/tags/${TAG}" --jq '.assets[].name')

          # Build platforms JSON
          PLATFORMS="{"
          first=true
          for target in "${!PLATFORM_URL[@]}"; do
            sig="${PLATFORM_SIG[$target]:-}"
            url="${PLATFORM_URL[$target]}"
            if [ -z "$sig" ] || [ -z "$url" ]; then
              echo "Warning: skipping $target (missing sig or url)"
              continue
            fi
            if [ "$first" = true ]; then
              first=false
            else
              PLATFORMS+=","
            fi
            PLATFORMS+="\"${target}\":{\"signature\":\"${sig}\",\"url\":\"${url}\"}"
          done
          PLATFORMS+="}"

          if [ "$first" = true ]; then
            echo "Warning: No valid platform entries found (no .sig assets on release)."
            echo "To enable in-app updates, set TAURI_SIGNING_PRIVATE_KEY in GitHub Secrets and re-release."
            echo "Skipping latest.json generation; release workflow will still succeed."
            exit 0
          fi

          # Build final latest.json using jq for proper escaping
          jq -n \
            --arg version "$TAG" \
            --arg notes "$NOTES" \
            --arg pub_date "$PUB_DATE" \
            --argjson platforms "$PLATFORMS" \
            '{version: $version, notes: $notes, pub_date: $pub_date, platforms: $platforms}' \
            > latest.json

          echo "Generated latest.json:"
          cat latest.json | jq .

      - name: Upload latest.json to Release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f latest.json ]; then
            gh release upload "${{ github.ref_name }}" latest.json --clobber --repo "${{ github.repository }}"
          else
            echo "No latest.json (no .sig assets); skipping upload."
          fi

  finalize:
    name: Mark Release as Latest
    needs: updater
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Set release as latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --latest

  homebrew:
    name: Update Homebrew Cask
    needs: bundle-macos
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Download macOS DMGs from release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          gh release download "$TAG" --repo "${{ github.repository }}" \
            -p "*.dmg" -D /tmp/dmg

      - name: Compute SHA256 and render Cask formula
        run: |
          TAG="${{ github.ref_name }}"

          ARM_DMG=(/tmp/dmg/*_aarch64.dmg)
          if [ ${#ARM_DMG[@]} -ne 1 ]; then
            echo "Expected exactly 1 Apple Silicon DMG:"
            ls -la /tmp/dmg/ 2>/dev/null || true
            exit 1
          fi

          SHA_ARM=$(sha256sum "${ARM_DMG[0]}" | awk '{print $1}')

          echo "Version : $TAG"
          echo "SHA(arm): $SHA_ARM"

          sed \
            -e "s/__VERSION__/$TAG/g" \
            -e "s/__SHA256_ARM__/$SHA_ARM/g" \
            .github/homebrew/bing-wallpaper-now.rb.template \
            > /tmp/bing-wallpaper-now.rb

          echo "--- rendered cask ---"
          cat /tmp/bing-wallpaper-now.rb

      - name: Push to homebrew-tap
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$TAP_TOKEN" ]; then
            echo "::error::HOMEBREW_TAP_TOKEN secret is not configured"
            exit 1
          fi

          TAG="${{ github.ref_name }}"
          REPO="qiyuey/homebrew-tap"

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/${REPO}.git" /tmp/tap
          mkdir -p /tmp/tap/Casks
          cp /tmp/bing-wallpaper-now.rb /tmp/tap/Casks/bing-wallpaper-now.rb

          cd /tmp/tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/bing-wallpaper-now.rb
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update bing-wallpaper-now to ${TAG}"
            git push
            echo "Pushed cask update for ${TAG}"
          fi

  winget:
    name: Update WinGet Package
    needs: [bundle-windows-x64, bundle-windows-arm64]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: windows-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: Qiyuey.BingWallpaperNow
          # 仅提交 MSI：Tauri NSIS .exe 的 WebView2 兜底文案会被 komac 误判为
          # "aborting entry" 而拒绝提交（"Failed to install WebView2!"）。
          # MSI 是 winget 推荐格式，且足以覆盖 x64/arm64 安装场景。
          installers-regex: '\.msi$'
          token: ${{ secrets.WINGET_TOKEN }}
