<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Bing Wallpaper Now app icon</title>
  <desc id="desc">A simple rounded-square landscape icon with a sun and two mountain peaks.</desc>
  <defs>
    <linearGradient id="sky" x1="512" y1="56" x2="512" y2="968" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#70E1EE"/>
      <stop offset="1" stop-color="#1760C3"/>
    </linearGradient>

    <radialGradient id="sun" cx="35%" cy="30%" r="72%">
      <stop offset="0" stop-color="#FFF4AD"/>
      <stop offset="0.58" stop-color="#FFD45C"/>
      <stop offset="1" stop-color="#FFB43F"/>
    </radialGradient>

    <linearGradient id="mountain" x1="220" y1="400" x2="820" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#61E58B"/>
      <stop offset="1" stop-color="#1261B4"/>
    </linearGradient>

    <clipPath id="iconShape">
      <rect x="56" y="56" width="912" height="912" rx="210"/>
    </clipPath>
  </defs>

  <g clip-path="url(#iconShape)">
    <rect x="56" y="56" width="912" height="912" rx="210" fill="url(#sky)"/>

    <circle cx="724" cy="292" r="108" fill="url(#sun)"/>

    <path d="M56 754L286 430C309 398 339 398 362 430L466 578L536 480C559 448 589 448 612 480L968 850V968H56V754Z" fill="url(#mountain)"/>

    <rect x="64" y="64" width="896" height="896" rx="202" fill="none" stroke="#FFFFFF" stroke-opacity="0.42" stroke-width="16"/>
  </g>
</svg>
